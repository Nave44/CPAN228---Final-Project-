<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Recipe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .ingredient-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }
        .ingredient-row input[type="text"] {
            flex: 2;
            padding: 6px;
        }
        .ingredient-row input[type="number"] {
            width: 70px;
            padding: 6px;
        }
        .ingredient-row select {
            flex: 1;
            padding: 6px;
        }
        .remove-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 6px 10px;
            cursor: pointer;
            border-radius: 4px;
        }
        #add-ingredient {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 8px 14px;
            cursor: pointer;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        label { display: block; margin-top: 16px; font-weight: bold; }
        input[type="text"], textarea, select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            margin-top: 4px;
        }
        textarea { height: 120px; }
        button[type="submit"] {
            margin-top: 20px;
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 24px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 16px;
        }
        .error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<h2>Create a Recipe</h2>

<form th:action="@{/createRecipe}" th:object="${recipe}" method="post" id="recipeForm">

    <label>Title</label>
    <input th:field="*{title}" placeholder="Title for your recipe..." required />

    <label>Description</label>
    <textarea th:field="*{description}" placeholder="Brief description of your recipe..." required></textarea>

    <label>Category</label>
    <select th:field="*{category.id}" required>
        <option value="">-- Select a Category --</option>
        <option th:each="cat : ${categories}"
                th:value="${cat.id}"
                th:text="${cat.name}">
        </option>
    </select>

    <!-- Ingredients Section -->
    <label>Ingredients</label>
    <div id="ingredient-list">
        <div class="ingredient-row">
            <input type="number" placeholder="Qty" min="0" step="0.1" class="qty-input"/>
            <select class="unit-select">
                <option value="">Unit</option>
                <option>tsp</option>
                <option>tbsp</option>
                <option>cup</option>
                <option>oz</option>
                <option>lb</option>
                <option>g</option>
                <option>kg</option>
                <option>ml</option>
                <option>L</option>
                <option>pinch</option>
                <option>whole</option>
            </select>
            <input type="text" placeholder="Ingredient name (e.g. flour)" class="ingredient-name" required/>
            <button type="button" class="remove-btn" onclick="removeIngredient(this)">✕</button>
        </div>
    </div>

    <button type="button" id="add-ingredient" onclick="addIngredient()">+ Add Ingredient</button>

    <!-- Hidden field that stores the combined ingredients string -->
    <input type="hidden" th:field="*{ingredients}" id="ingredients-hidden"/>

    <label>Instructions</label>
    <textarea th:field="*{instructions}" placeholder="Step-by-step instructions..." required></textarea>

    <button type="submit">Submit Recipe</button>
</form>

<script>
    // Add event listener for form submission
    document.getElementById('recipeForm').addEventListener('submit', function(e) {
        if (!combineIngredients()) {
            e.preventDefault();
            alert('Please add at least one ingredient with a name');
        }
    });

    function addIngredient() {
        const row = document.createElement("div");
        row.classList.add("ingredient-row");
        row.innerHTML = `
            <input type="number" placeholder="Qty" min="0" step="0.1" class="qty-input"/>
            <select class="unit-select">
                <option value="">Unit</option>
                <option>tsp</option>
                <option>tbsp</option>
                <option>cup</option>
                <option>oz</option>
                <option>g</option>
                <option>ml</option>
                <option>pinch</option>
                <option>whole</option>
            </select>
            <input type="text" placeholder="Ingredient name (e.g. flour)" class="ingredient-name"/>
            <button type="button" class="remove-btn" onclick="removeIngredient(this)">✕</button>
        `;
        document.getElementById("ingredient-list").appendChild(row);
    }

    function removeIngredient(btn) {
        const list = document.getElementById("ingredient-list");
        if (list.children.length > 1) {
            btn.parentElement.remove();
        }
    }

    function combineIngredients() {
        const rows = document.querySelectorAll(".ingredient-row");
        const parts = [];
        let hasValidIngredient = false;

        rows.forEach(row => {
            const qty    = row.querySelector(".qty-input").value.trim();
            const unit   = row.querySelector(".unit-select").value.trim();
            const name   = row.querySelector(".ingredient-name").value.trim();

            if (name) {
                hasValidIngredient = true;
                let ingredient = "";
                if (qty)  ingredient += qty + " ";
                if (unit && unit !== "") ingredient += unit + " ";
                ingredient += name;
                parts.push(ingredient);
            }
        });

        const combinedIngredients = parts.join(", ");
        document.getElementById("ingredients-hidden").value = combinedIngredients;

        // Debug: Check if it's working
        console.log("Combined ingredients:", combinedIngredients);

        return hasValidIngredient;
    }
</script>

</body>
</html>
