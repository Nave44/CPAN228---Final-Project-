<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${recipe != null} ? recipe.title : 'Recipe Details'">Recipe Details</title>
</head>
<body>
<main class="container">
    <article class="recipe-detail" th:if="${recipe != null}">
        <h1 th:text="${recipe.title}">Recipe Name</h1>
        <p th:text="${recipe.description}">Recipe description</p>
        <section>
            <h2>Ingredients</h2>
            <p th:text="${recipe.ingredients}">Recipe ingredients</p>
        </section>
        <section>
            <h2>Instructions</h2>
            <p th:text="${recipe.instructions}">Recipe instructions</p>
        </section>
        <section>
            <h2>Category</h2>
            <p th:text="${recipe.category != null} ? recipe.category.name : 'No category'">Category</p>
        </section>
        <a class="button" href="/">Back to recipes</a>
    </article>

    <article class="recipe-detail" th:if="${recipe == null}">
        <h1>Recipe Not Found</h1>
        <p>Could not find a recipe with id <span th:text="${id}">0</span>.</p>
        <a class="button" href="/">Back to recipes</a>
    </article>
</main>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f2f2f2;
        color: #222;
        display: flex;
        justify-content: center;
        padding: 24px;
    }
    .container {
        width: min(900px, 100%);
    }
    .recipe-detail {
        background: #fff;
        border: 1px solid #d6dcea;
        border-radius: 0;
        padding: 24px;
        box-shadow: 0 20px 24px rgba(30, 36, 48, 0.08);
    }
    .recipe-detail h1,
    .recipe-detail h2 {
        margin-top: 0;
    }
    .recipe-detail a {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 16px;
        background: #d6dcea;
        color: black;
        text-decoration: none;
        border-radius: 0;
        font-weight: 600;
    }
</style>
</body>
</html>
