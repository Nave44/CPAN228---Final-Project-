<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipe Home</title>
</head>
<body>
  <main class="container">
    <header class="page-header">
      <h1>Recipes</h1>
      <a class="button" th:href="@{/createRecipe}">Create Recipe</a>
    </header>

    <div class="panel-grid">
      <article class="panel" th:each="recipe : ${recipes}">
        <a class="panel-link" th:href="@{/recipes/{id}(id=${recipe.id})}">
          <h2 th:text="${recipe.name} ?: 'Unnamed Recipe'">Recipe Name</h2>
          <p class="text" th:text="${recipe.description} ?: 'No description yet.'">Recipe description</p>
          <div class="meta">
            <span>ID: <span th:text="${recipe.id}">0</span></span>
            <span th:text="${recipe.category != null} ? recipe.category.name : 'Uncategorized'">Category</span>
            <span th:text="${recipe.creator != null} ? recipe.creator.username : 'Creator unknown'">Creator</span>
          </div>
        </a>
        <div class="rating-row">
          <div class="stars" aria-label="Rate this recipe"></div>
        </div>
      </article>
    </div>
  </main>

  <script>
    document.querySelectorAll('.panel').forEach((panel) => {
      const starsContainer = panel.querySelector('.stars');
      let selected = 0;

      for (let i = 1; i <= 5; i++) {
        const star = document.createElement('button');
        star.type = 'button';
        star.className = 'star';
        star.textContent = '★';
        star.setAttribute('aria-label', `Rate this recipe ${i} stars`);
        star.dataset.value = String(i);

        star.addEventListener('click', (event) => {
          event.stopPropagation();
          selected = i;
          updateStars();
        });

        starsContainer.appendChild(star);
      }

      function updateStars() {
        panel.querySelectorAll('.star').forEach((button) => {
          const value = Number(button.dataset.value);
          button.classList.toggle('active', value <= selected);
        });
      }
    });
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #edf2f7;
      color: #111;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      width: min(1000px, 100%);
      margin: 0 auto;
    }
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      gap: 16px;
    }
    .page-header h1 {
      margin: 0;
      font-size: 2rem;
    }
    .button {
      display: inline-block;
      padding: 10px 18px;
      background: #ffffff;
      color: black;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
    }
    .panel-grid {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }
    .panel {
      background: white;
      border: 1px solid #d6dcea;
      border-radius: 0;
      overflow: hidden;
      box-shadow: 0 16px 28px rgba(23, 28, 39, 0.08);
    }
    .panel-link {
      color: inherit;
      text-decoration: none;
      display: block;
      padding: 24px;
    }
    .panel h2 {
      margin: 0 0 14px;
      font-size: 1.4rem;
    }
    .text {
      margin: 0 0 18px;
      line-height: 1.6;
      color: #333;
      min-height: 72px;
    }
    .meta {
      font-size: 0.95rem;
      color: #5b6674;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }
    .rating-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 24px 20px;
      border-top: 1px solid #f1f2f6;
    }
    .rating-label {
      font-size: 0.95rem;
      color: #5b6674;
      white-space: nowrap;
    }
    .stars {
      display: inline-flex;
      gap: 6px;
    }
    .star {
      border: none;
      background: transparent;
      font-size: 1.4rem;
      color: #d1d5db;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }
    .star.active {
      color: #fbbf24;
    }
  </style>
</body>
</html>
