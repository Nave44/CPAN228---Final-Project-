<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Recipe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .ingredient-row, .instruction-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }
        .ingredient-row input[type="text"], .instruction-row input[type="text"] {
            flex: 1;
            padding: 8px;
        }
        .remove-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 6px 10px;
            cursor: pointer;
            border-radius: 4px;
        }
        #add-ingredient, #add-instruction {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 8px 14px;
            cursor: pointer;
            border-radius: 4px;
            margin-bottom: 20px;
            margin-right: 10px;
        }
        label { display: block; margin-top: 16px; font-weight: bold; }
        input[type="text"], textarea, select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            margin-top: 4px;
        }
        textarea { height: 120px; }
        button[type="submit"] {
            margin-top: 20px;
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 24px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 16px;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<h2>Create a Recipe</h2>

<form th:action="@{/createRecipe}" th:object="${recipe}" method="post" id="recipeForm">

    <label>Title</label>
    <input th:field="*{title}" placeholder="Title for your recipe..." required />

    <label>Description</label>
    <textarea th:field="*{description}" placeholder="Brief description of your recipe..." required></textarea>

    <label>Category</label>
    <select th:field="*{category.id}" required>
        <option value="">-- Select a Category --</option>
        <option th:each="cat : ${categories}"
                th:value="${cat.id}"
                th:text="${cat.name}">
        </option>
    </select>

    <!-- Ingredients Section -->
    <div class="section-header">
        <label>Ingredients</label>

    </div>
    <div id="ingredient-list">
        <div class="ingredient-row">
            <input type="text" placeholder="e.g., 2 cups flour" class="ingredient-input"/>
            <button type="button" class="remove-btn" onclick="removeIngredient(this)">✕</button>
        </div>
    </div>
    <button type="button" id="add-ingredient" onclick="addIngredient()">+ Add Ingredient</button>

    <!-- Instructions Section -->
    <div class="section-header">
        <label>Instructions</label>

    </div>
    <div id="instruction-list">
        <div class="instruction-row">
            <input type="text" placeholder="e.g., Preheat oven to 350°F" class="instruction-input"/>
            <button type="button" class="remove-btn" onclick="removeInstruction(this)">✕</button>
        </div>
    </div>
    <button type="button" id="add-instruction" onclick="addInstruction()">+ Add Instruction</button> <br/>

    <!-- Hidden fields that store the combined strings -->
    <input type="hidden" th:field="*{ingredients}" id="ingredients-hidden"/>
    <input type="hidden" th:field="*{instructions}" id="instructions-hidden"/>

    <button type="submit" onclick="combineData()">Submit Recipe</button>

</form>

<script>
    function addIngredient() {
        const row = document.createElement("div");
        row.classList.add("ingredient-row");
        row.innerHTML = `
            <input type="text" placeholder="e.g., 2 cups flour" class="ingredient-input"/>
            <button type="button" class="remove-btn" onclick="removeIngredient(this)">✕</button>
        `;
        document.getElementById("ingredient-list").appendChild(row);
    }

    function removeIngredient(btn) {
        const list = document.getElementById("ingredient-list");
        if (list.children.length > 1) {
            btn.parentElement.remove();
        }
    }

    function addInstruction() {
        const row = document.createElement("div");
        row.classList.add("instruction-row");
        row.innerHTML = `
            <input type="text" placeholder="e.g., Preheat oven to 350°F" class="instruction-input"/>
            <button type="button" class="remove-btn" onclick="removeInstruction(this)">✕</button>
        `;
        document.getElementById("instruction-list").appendChild(row);
    }

    function removeInstruction(btn) {
        const list = document.getElementById("instruction-list");
        if (list.children.length > 1) {
            btn.parentElement.remove();
        }
    }

    function combineData() {
        // Combine ingredients
        const ingredientRows = document.querySelectorAll(".ingredient-input");
        const ingredients = [];
        ingredientRows.forEach(input => {
            const value = input.value.trim();
            if (value) {
                ingredients.push(value);
            }
        });
        document.getElementById("ingredients-hidden").value = ingredients.join(", ");

        // Combine instructions
        const instructionRows = document.querySelectorAll(".instruction-input");
        const instructions = [];
        instructionRows.forEach((input, index) => {
            const value = input.value.trim();
            if (value) {
                instructions.push(value);
            }
        });
        document.getElementById("instructions-hidden").value = instructions.join(". ");

        // Debug: check what's being submitted
        console.log("Ingredients:", document.getElementById("ingredients-hidden").value);
        console.log("Instructions:", document.getElementById("instructions-hidden").value);
    }
</script>

</body>
</html>
