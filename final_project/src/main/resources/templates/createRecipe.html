<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Recipe</title>
</head>
<body>
  <main class="container">
    <header class="page-header">
      <h1>Create Recipe</h1>
      <a class="button" th:href="@{/}">Back to Home</a>
    </header>

    <form class="recipe-form" th:action="@{/createRecipe}" th:object="${recipe}" method="post">
      <label>
        Name
        <input type="text" th:field="*{name}" placeholder="Recipe name" required />
      </label>

      <label>
        Description
        <textarea th:field="*{description}" placeholder="Short description"></textarea>
      </label>

      <label>
        Ingredients
        <textarea th:field="*{ingredients}" placeholder="List ingredients"></textarea>
      </label>

      <label>
        Instructions
        <textarea th:field="*{instructions}" placeholder="Step-by-step instructions"></textarea>
      </label>

      <button type="submit">Save Recipe</button>
    </form>
  </main>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #edf2f7;
      color: #111;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      width: min(800px, 100%);
      margin: 0 auto;
    }
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      gap: 16px;
    }
    .button {
      display: inline-block;
      padding: 10px 18px;
      background: #ffffff;
      color: black;
      text-decoration: none;
      border-radius: 0;
      font-weight: 600;
    }
    .recipe-form {
      display: grid;
      gap: 18px;
      background: white;
      border: 1px solid #d6dcea;
      padding: 24px;
      box-shadow: 0 16px 24px rgba(23, 28, 39, 0.08);
    }
    label {
      display: grid;
      gap: 8px;
      font-weight: 600;
      color: #1f2937;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #d6dcea;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    button {
      width: max-content;
      padding: 12px 20px;
      border: none;
      border-radius: 0;
      background: #1f2937;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</body>
</html>
